
services:
  kg-managesystem-frontend:
    build:
      context: ./kg-managesystem-master
    container_name: ceramikg-frontend
    env_file:
      - ./.env
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      cig-kg-backend:
        condition: service_healthy
      pdf-flask-handler:
        condition: service_healthy

  pdf-flask-handler:
    build:
      context: .
      dockerfile: pdf-flask-handler/Dockerfile
    container_name: ceramikg-pdf-handler
    env_file:
      - ./.env
    ports:
      - "${PDF_SERVICE_PORT}:8001"
    environment:
      DATABASE_URL: "mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}"
      ELASTICSEARCH_URL: "http://elasticsearch:${ELASTICSEARCH_PORT}"
      UPLOAD_FOLDER: "/app/uploads"
      MINERU_OUTPUT_FOLDER: "/app/uploads/mineru_outputs"
      MINERU_BACKEND: "pipeline"
      MINERU_PARSE_METHOD: "auto"
      MINERU_LANG: "ch"
      MINERU_ENABLED: "false"
      MINERU_MODEL_SOURCE: "modelscope"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      PORT: "8001"
      FLASK_DEBUG: "${FLASK_DEBUG}"
    volumes:
      - ./pdf-flask-handler/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8001)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  cig-kg-backend:
    build:
      context: ./cig-kg-backend-master
    container_name: ceramikg-backend
    env_file:
      - ./.env
    ports:
      - "${KG_SERVICE_PORT}:8000"
    environment:
      MONGO_URI: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:${MONGO_PORT}"
      MONGO_DB: "documents"
      MONGO_COLLECTION: "documents_json"
      MYSQL_HOST: "${MYSQL_HOST}"
      MYSQL_PORT: "${MYSQL_PORT}"
      MYSQL_USER: "root"
      MYSQL_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      API_KEY: "${API_KEY}"
      BASE_URL: "${BASE_URL}"
      QWEN_API_KEY: "${QWEN_API_KEY}"
      QWEN_API_BASE: "${QWEN_API_BASE}"
      MODEL_NAME: "${MODEL_NAME}"
      FILE_BASE_PATH: "/app/uploads"
      # Neo4j 閰嶇疆 - 浣跨敤鏈嶅姟鍚?neo4j 鍜屽唴閮ㄧ鍙?7687
      NEO4J_URI: "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-password}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      EXTRACTED_KG_ROOT: "/app/relation"
    volumes:
      - ./pdf-flask-handler/uploads:/app/uploads:ro
      - ./cig-kg-backend-master:/app:cached
      - ./relation:/app/relation:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy  # 绛夊緟 Neo4j 鍋ュ悍
  mysql:
    image: mysql:8.0
    container_name: ceramikg-mysql
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_CHARSET: "utf8mb4"
      MYSQL_COLLATION: "utf8mb4_unicode_ci"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongo:
    image: mongo:6
    container_name: ceramikg-mongo
    env_file:
      - ./.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: ceramikg-elasticsearch
    env_file:
      - ./.env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    deploy:
      resources:
        limits:
          memory: 8g
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
  # 鏂板 Neo4j 鏈嶅姟
  neo4j:
    image: neo4j:5.19.0-community
    container_name: ceramikg-neo4j
    env_file:
      - ./.env
    environment:
      # 璁よ瘉閰嶇疆
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      # 鍐呭瓨閰嶇疆
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE_SIZE:-512M}
      - NEO4J_server_memory_heap_initial__size=${NEO4J_HEAP_INITIAL:-512M}
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP_MAX:-1G}
      # 馃敟 鍏抽敭锛氱鐢ㄤ弗鏍奸獙璇侊紙閬垮厤閰嶇疆閿欒锛?
      - NEO4J_server_config_strict__validation_enabled=false
      # 鍏佽鎵€鏈?IP 杩炴帴
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
      - NEO4J_server_http_listen__address=0.0.0.0:7474
    ports:
      # 浣跨敤涓嶅悓鐨勪富鏈虹鍙ｉ伩鍏嶄笌鐜版湁 neo4j-enterprise 鍐茬獊
      - "${NEO4J_HTTP_PORT:-7475}:7474"   # 涓绘満绔彛 7475锛屽鍣ㄥ唴閮?7474
      - "${NEO4J_BOLT_PORT:-7689}:7687"   # 涓绘満绔彛 7689锛屽鍣ㄥ唴閮?7687
    volumes:
      # 浣跨敤鐙珛鐨勫嵎锛岄伩鍏嶆暟鎹贩涔?
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      # 涓嶆寕杞?conf 鐩綍锛屼娇鐢ㄥ鍣ㄩ粯璁ら厤缃?
    # 鍋ュ悍妫€鏌?
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
  es_data:
  # 鏂板 Neo4j 鏁版嵁鍗?
  neo4j_data:
  neo4j_logs:
  neo4j_import:

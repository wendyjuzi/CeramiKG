server {
  listen 80;
  server_name _;

  # Increase allowed upload size (PDF/doc uploads via proxied backends)
  client_max_body_size 100m;

  root /usr/share/nginx/html;
  index index.html;

  # --- Reverse proxies ---
  # Backend (FastAPI)
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    proxy_pass http://cig-kg-backend:8000;
  }

  # Some endpoints may serve static files via /files
  location /files/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    proxy_pass http://cig-kg-backend:8000;
  }

  # PDF flask handler (upload/list/preview)
  location /pdf/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # 保留末尾斜杠以便替换匹配的前缀 (/pdf/)，后端实际接收的路径将从 /pdf/... -> /...。
    proxy_pass http://pdf-flask-handler:8001/;
  }

  # --- SPA history fallback ---
  location / {
    try_files $uri $uri/ /index.html;
  }
}
